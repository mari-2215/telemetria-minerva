name: CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest

  firmware:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware/mega
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install platformio
      - run: pio run

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter create --platforms=android,web --org br.org.minervanautica .
      - name: Configurar rede Android
        run: |
          python - <<'PYTHON'
          from pathlib import Path

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text(encoding="utf-8")

          if "android.permission.INTERNET" not in text:
              text = text.replace(
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">',
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n'
                  '    <uses-permission android:name="android.permission.INTERNET" />',
              )

          if 'android:usesCleartextTraffic="true"' not in text:
              text = text.replace(
                  "<application",
                  '<application android:usesCleartextTraffic="true"',
                  1,
              )

          manifest.write_text(text, encoding="utf-8")
          PYTHON
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build web --release
      - run: flutter build apk --release
      - run: flutter build appbundle --release
      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: telemetria-minerva-android-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30
      - name: Publicar Android App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: telemetria-minerva-android-aab
          path: app/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 30

  ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter create --platforms=ios --org br.org.minervanautica .
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - name: Compilar iOS sem assinatura
        run: flutter build ios --release --no-codesign
      - name: Empacotar build iOS de validacao
        run: ditto -c -k --sequesterRsrc --keepParent build/ios/iphoneos/Runner.app build/telemetria-minerva-ios-unsigned.zip
      - name: Publicar build iOS sem assinatura
        uses: actions/upload-artifact@v4
        with:
          name: telemetria-minerva-ios-unsigned
          path: app/build/telemetria-minerva-ios-unsigned.zip
          if-no-files-found: error
          retention-days: 30

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f deploy/Dockerfile .
