name: telemetria_minerva_app
description: Aplicativo de telemetria da Minerva Nautica
publish_to: none
version: 0.1.2+3

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^8.2.2
  http: ^1.5.0
  latlong2: ^0.9.1
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Variable.ttf
  assets:
    - assets/fonts/OFL-Manrope.txt
    - assets/images/minerva_nautica.png
    - assets/models/minerva_tug.mesh
