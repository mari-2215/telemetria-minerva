name: telemetria_minerva_app
description: Aplicativo de telemetria da Minerva Nautica
publish_to: none
version: 0.2.0+4

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^8.2.2
  http: ^1.5.0
  latlong2: ^0.9.1
  shared_preferences: ^2.5.3
  mobile_scanner: ^7.4.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Variable.ttf
  assets:
    - assets/fonts/OFL-Manrope.txt
    - assets/images/minerva_nautica.png
    - assets/images/minerva_app_icon.png
    - assets/images/minerva_app_icon_foreground.png
    - assets/manuals/
    - assets/models/minerva_tug.mesh

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/minerva_app_icon.png
  adaptive_icon_background: "#05084A"
  adaptive_icon_foreground: assets/images/minerva_app_icon_foreground.png
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/images/minerva_app_icon.png
    background_color: "#05084A"
    theme_color: "#05084A"
